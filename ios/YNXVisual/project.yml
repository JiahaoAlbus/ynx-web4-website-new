name: YNXVisual
options:
  bundleIdPrefix: com.ynxweb4
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  YNXVisual:
    type: application
    platform: iOS
    sources:
      - path: Sources/YNXVisualApp
    info:
      path: YNXVisualApp/Info.plist
      properties:
        CFBundleDisplayName: YNX Visual
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Light
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ynxweb4.visual
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
